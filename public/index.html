<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PlanetCorps AI Academy</title>
<link rel="icon" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Quicksand',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Variables ── */
:root{
  --bg:#f8faf8;
  --surface:#ffffff;
  --surface2:#f0f4f0;
  --border:#e2e2e2;
  --text:#1b1b1b;
  --muted:#5e5e5e;
  --primary:#4a7c59;
  --primary-light:#8fad7f;
  --cyan:#2a8f96;
  --rose:#e05260;
  --amber:#d4a017;
  --mint:#4a7c59;
  --ease:cubic-bezier(0.4,0,0.2,1);
}

/* ── Shell ── */
.shell{max-width:1100px;margin:0 auto;padding:0 24px;position:relative}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.header .shell{display:flex;align-items:center;gap:20px;height:auto;min-height:64px;flex-wrap:wrap;padding-top:8px;padding-bottom:8px}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand-logo{width:36px;height:36px}
.brand-name{font-weight:700;font-size:1.05rem;letter-spacing:-0.01em;color:var(--text)}
.brand-name .green{color:var(--primary)}
.brand-sub{font-size:0.7rem;color:var(--muted);font-weight:500;letter-spacing:0.03em}
.vdiv{width:1px;height:28px;background:var(--border);flex-shrink:0}
#nav{display:flex;gap:4px;flex-wrap:wrap}
.breadcrumb{font-size:0.85rem;color:var(--muted);display:flex;align-items:center;flex-shrink:0}
.breadcrumb a{color:var(--primary);text-decoration:none;font-weight:500}
.breadcrumb a:hover{text-decoration:underline}

/* ── Tabs ── */
.tab{padding:6px 12px;font-size:0.82rem;font-weight:600;color:var(--muted);border-radius:8px 8px 0 0;border-bottom:2px solid transparent;transition:color .2s var(--ease),border-color .2s var(--ease);white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ── Main ── */
.main{padding-top:88px;padding-bottom:60px;min-height:100vh}

/* ── Views ── */
.view{display:none;animation:fadeUp .35s var(--ease)}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Stat Grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.stat-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.stat-value{font-size:2rem;font-weight:700;color:var(--primary);line-height:1.1}
.stat-label{color:var(--muted);font-size:0.85rem;margin-top:4px}

/* ── Domain Grid & Progress Rings ── */
.domain-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.domain-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.domain-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08)}

/* ── Card (general) ── */
.card{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.program-card{background:var(--surface);border-radius:12px;padding:32px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:transform .2s var(--ease),box-shadow .2s var(--ease);cursor:pointer}
.program-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.1)}
.program-card .program-icon{font-size:2.5rem;margin-bottom:12px}
.program-card .program-name{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:8px}
.program-card .program-desc{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:16px}
.program-card .program-meta{display:flex;align-items:center;gap:16px;font-size:0.85rem;color:var(--muted)}

/* ── Quiz ── */
.quiz-container{max-width:720px;margin:0 auto}
.quiz-progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:24px}
.quiz-progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .4s var(--ease)}
.quiz-scenario{background:var(--surface2);border-radius:12px;padding:20px;font-style:italic;color:var(--muted);line-height:1.7;margin-bottom:20px;border:1px solid var(--border)}
.quiz-question{font-size:1.05rem;font-weight:600;margin-bottom:16px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:12px}
.quiz-option{background:var(--surface);padding:16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:all .2s var(--ease);line-height:1.5;font-size:0.95rem}
.quiz-option:hover{border-color:var(--primary)}
.quiz-option.selected{border-color:var(--primary);background:rgba(74,124,89,0.08)}
.quiz-option.correct{border-color:var(--mint);background:rgba(74,124,89,0.1);cursor:default}
.quiz-option.wrong{border-color:var(--rose);background:rgba(224,82,96,0.08);cursor:default}
.quiz-option.disabled{pointer-events:none;opacity:0.6}
.quiz-explanation{background:var(--surface2);border-radius:12px;padding:16px;border-left:3px solid var(--primary);margin-top:16px;line-height:1.6;font-size:0.92rem;color:var(--muted)}
.quiz-explanation strong{color:var(--text)}
.quiz-btn{background:var(--primary);color:#fff;border-radius:10px;padding:12px 24px;font-weight:600;font-size:0.95rem;transition:opacity .2s var(--ease),transform .1s var(--ease)}
.quiz-btn:hover{opacity:0.9}
.quiz-btn:active{transform:scale(0.97)}
.quiz-btn:disabled{opacity:0.4;cursor:not-allowed}
.quiz-actions{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.quiz-score{text-align:center;padding:40px 0}
.quiz-score-value{font-size:3rem;font-weight:700;color:var(--primary)}

/* ── Curriculum Reader ── */
.reader-layout{display:flex;gap:24px;align-items:flex-start}
.reader-toc{width:240px;flex-shrink:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);position:sticky;top:88px;max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.reader-toc::-webkit-scrollbar{width:4px}
.reader-toc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.toc-header{padding:16px;font-weight:700;font-size:0.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border)}
.toc-item{padding:8px 16px;font-size:0.85rem;cursor:pointer;border-left:2px solid transparent;color:var(--muted);transition:all .15s var(--ease);display:block;width:100%}
.toc-item:hover{color:var(--text);background:rgba(74,124,89,0.04)}
.toc-item.active{border-left-color:var(--primary);color:var(--primary);background:rgba(74,124,89,0.06)}
.reader-content{flex:1;min-width:0}

/* ── Markdown Body ── */
.md-body h1{font-weight:700;font-size:1.6rem;margin-bottom:16px;color:var(--text)}
.md-body h2{font-weight:700;font-size:1.25rem;margin:32px 0 12px;padding-bottom:8px;border-bottom:2px solid;border-image:linear-gradient(90deg,var(--primary),var(--primary-light)) 1;color:var(--text)}
.md-body h3{font-weight:700;font-size:1.1rem;margin:24px 0 8px;color:var(--text)}
.md-body h4{font-weight:700;font-size:0.95rem;margin:20px 0 8px;color:var(--text)}
.md-body p{margin-bottom:12px;color:var(--muted);line-height:1.7}
.md-body ul,.md-body ol{margin:0 0 12px 20px;color:var(--muted)}
.md-body li{margin-bottom:6px;line-height:1.6}
.md-body li::marker{color:var(--muted)}
.md-body strong{color:var(--text);font-weight:600}
.md-body em{font-style:italic}
.md-body a{color:var(--primary)}
.md-body a:hover{text-decoration:underline}
.md-body code{background:var(--surface2);color:var(--cyan);border-radius:4px;padding:2px 6px;font-size:0.88em;font-family:'Fira Code','Consolas',monospace}
.md-body pre{background:var(--surface2);border-radius:12px;padding:16px;overflow-x:auto;margin-bottom:16px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.md-body pre code{background:none;padding:0;border-radius:0;color:var(--text);font-size:0.85rem;line-height:1.6}
.md-body blockquote{border-left:3px solid var(--primary);background:var(--surface2);padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;color:var(--muted);font-style:italic}
.md-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.9rem}
.md-body th{text-align:left;padding:10px 14px;background:var(--surface2);color:var(--text);font-weight:600;border-bottom:1px solid var(--border)}
.md-body td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--muted)}
.md-body tr:nth-child(even) td{background:rgba(74,124,89,0.03)}
.md-body hr{border:none;height:1px;background:var(--border);margin:24px 0}
.md-body img{max-width:100%;border-radius:8px}

/* ── Section Checkbox ── */
.section-check{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;vertical-align:middle;margin-right:8px}

/* ── Glossary ── */
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:0.95rem;outline:none;transition:border-color .2s var(--ease);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--primary)}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .15s var(--ease);white-space:nowrap}
.pill.active{background:rgba(74,124,89,0.12);color:var(--primary);border:1px solid rgba(74,124,89,0.2)}
.pill:not(.active){background:transparent;border:1px solid var(--border);color:var(--muted)}
.pill:hover{color:var(--text)}
.glossary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.glossary-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:box-shadow .2s var(--ease)}
.glossary-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.glossary-term{font-weight:700;font-size:1rem;margin-bottom:8px;color:var(--text)}
.glossary-def{color:var(--muted);font-size:0.88rem;line-height:1.6}
.domain-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600;background:rgba(74,124,89,0.1);color:var(--primary);margin-top:10px}

/* ── Study Plan ── */
.phase-card{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:box-shadow .2s var(--ease)}
.phase-card.current{border-color:rgba(74,124,89,0.4);box-shadow:0 2px 12px rgba(74,124,89,0.08)}
.phase-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.phase-num{color:var(--primary);font-weight:700;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.phase-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.phase-desc{color:var(--muted);font-size:0.9rem;margin-bottom:16px;line-height:1.6}
.checkpoint-list{display:flex;flex-direction:column;gap:2px}
.checkpoint-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.checkpoint-check{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}
.checkpoint-label{font-size:0.9rem;color:var(--muted);line-height:1.4}
.checkpoint-label.checked{color:var(--text);text-decoration:line-through;opacity:0.5}
.milestone{color:var(--muted);font-style:italic;margin-top:12px;font-size:0.85rem;padding-left:4px}

/* ── Exercises ── */
.exercise-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:box-shadow .2s var(--ease)}
.exercise-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.exercise-header{display:flex;align-items:center;gap:12px;padding:20px 24px;cursor:pointer;user-select:none}
.exercise-header::after{content:'';width:8px;height:8px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);margin-left:auto;flex-shrink:0;transition:transform .2s var(--ease)}
.exercise-card.expanded .exercise-header::after{transform:rotate(-135deg)}
.exercise-num{font-weight:700;font-size:0.75rem;color:var(--primary);text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
.exercise-title{font-weight:600;font-size:0.95rem;color:var(--text)}
.exercise-body{padding:0 24px 24px;display:none}
.exercise-card.expanded .exercise-body{display:block}
.exercise-desc{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:16px}
.criteria-list{display:flex;flex-direction:column;gap:6px}
.criteria-item{display:flex;align-items:flex-start;gap:10px;font-size:0.88rem;color:var(--muted);line-height:1.5}
.criteria-item input[type="checkbox"]{margin-top:4px;accent-color:var(--primary);cursor:pointer;flex-shrink:0}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s var(--ease)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:12px;max-width:500px;width:calc(100% - 48px);padding:32px;border:1px solid var(--border);box-shadow:0 16px 48px rgba(0,0,0,0.12);animation:scaleIn .25s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-weight:700;font-size:1.15rem;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:6px;font-weight:500}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;transition:border-color .2s var(--ease)}
.form-input:focus{border-color:var(--primary)}
.form-textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;min-height:120px;resize:vertical;transition:border-color .2s var(--ease)}
.form-textarea:focus{border-color:var(--primary)}
.form-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;transition:border-color .2s var(--ease);appearance:none}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.btn-primary{background:#0c0d0c;color:#fff;border-radius:8px;padding:10px 20px;font-weight:600;font-size:0.9rem;transition:opacity .2s var(--ease)}
.btn-primary:hover{opacity:0.85}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:10px 20px;font-weight:500;font-size:0.9rem;transition:color .15s var(--ease),border-color .15s var(--ease)}
.btn-secondary:hover{color:var(--text);border-color:var(--text)}

/* ── Auth Screen ── */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.auth-card{background:var(--surface);border-radius:16px;padding:40px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,0.08);max-width:400px;width:100%}
.auth-card .brand{justify-content:center;margin-bottom:32px}
.auth-card h2{text-align:center;margin-bottom:24px;font-size:1.2rem}
.auth-error{background:rgba(224,82,96,0.08);color:var(--rose);border:1px solid rgba(224,82,96,0.2);border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:16px;display:none}
.auth-form .form-group{margin-bottom:16px}
.auth-form .form-label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:6px;font-weight:500}
.auth-form .form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:0.95rem;outline:none;transition:border-color .2s var(--ease)}
.auth-form .form-input:focus{border-color:var(--primary)}
.auth-toggle{text-align:center;margin-top:20px;font-size:0.88rem;color:var(--muted)}
.auth-toggle a{color:var(--primary);cursor:pointer;font-weight:600}
.auth-toggle a:hover{text-decoration:underline}

/* ── User Menu ── */
.user-menu{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0}
.user-name{font-size:0.85rem;font-weight:600;color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:0.8rem;color:var(--rose);font-weight:600;cursor:pointer;padding:4px 10px;border-radius:6px;transition:background .15s var(--ease)}
.logout-btn:hover{background:rgba(224,82,96,0.08)}

/* ── Footer ── */
.footer{text-align:center;padding:32px 0 24px;font-size:0.8rem;color:var(--muted)}
.footer strong{color:var(--text);font-weight:600}

/* ── Admin Dashboard ── */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.admin-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
.admin-card h3{margin:0 0 12px;font-size:0.95rem;color:var(--text)}
.admin-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:700;text-transform:uppercase}
.admin-badge.dev{background:#dcfce7;color:#166534}
.admin-badge.main{background:#fef2f2;color:#991b1b}
.admin-badge.local{background:#dbeafe;color:#1e40af}
.admin-badge.prod{background:#fef3c7;color:#92400e}
.commit-list{list-style:none;padding:0;margin:8px 0 0}
.commit-list li{padding:8px 12px;border-left:3px solid var(--primary);margin-bottom:6px;background:#f9fafb;border-radius:0 6px 6px 0;font-size:0.82rem}
.commit-list .hash{color:var(--primary);font-family:monospace;font-weight:600;margin-right:8px}
.file-list{list-style:none;padding:0;margin:8px 0 0}
.file-list li{padding:4px 8px;font-size:0.8rem;font-family:monospace;color:var(--muted)}
.file-list .added{color:#166534}
.file-list .modified{color:#92400e}
.file-list .deleted{color:#991b1b}
.deploy-btn{background:var(--primary);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;transition:background .15s}
.deploy-btn:hover{background:#3d6b4a}
.deploy-btn:disabled{background:#ccc;cursor:not-allowed}
.deploy-log{background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:8px;font-family:monospace;font-size:0.8rem;max-height:300px;overflow-y:auto;margin-top:12px;white-space:pre-wrap;display:none}
.deploy-log.visible{display:block}
.warning-box{background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px 16px;font-size:0.85rem;color:#92400e;margin-bottom:16px}
@media(max-width:768px){.admin-grid{grid-template-columns:1fr}}

/* ── Utilities ── */
.hidden{display:none!important}
.flex{display:flex}
.flex-col{display:flex;flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-8{gap:8px}
.gap-12{gap:12px}
.gap-16{gap:16px}
.gap-20{gap:20px}
.gap-24{gap:24px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.mb-24{margin-bottom:24px}
.text-center{text-align:center}
.text-muted{color:var(--muted)}
.text-primary{color:var(--primary)}
.text-sm{font-size:0.85rem}
.fw-700{font-weight:700}
.w-full{width:100%}

/* ── Loading Skeleton ── */
.loading{position:relative;overflow:hidden;background:var(--surface2);border-radius:8px}
.loading::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.loading-block{height:16px;margin-bottom:12px;border-radius:6px}
.loading-block.lg{height:24px;width:60%}
.loading-block.sm{height:12px;width:40%}
.loading-card{height:160px;border-radius:12px}

/* ── Section Title ── */
.section-title{font-weight:700;font-size:1.1rem;color:var(--text);margin-bottom:16px}

/* ── Quick Action Button ── */
.quick-action{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-weight:500;font-size:0.9rem;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.04);transition:all .2s var(--ease);cursor:pointer}
.quick-action:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-1px)}
.quick-action .icon{font-size:1.2rem}

/* ── Back Button ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:0.88rem;font-weight:500;cursor:pointer;padding:6px 0;margin-bottom:16px;transition:color .15s var(--ease)}
.back-btn:hover{color:var(--text)}
.back-btn::before{content:'\2190';font-size:1rem}

/* ── Empty State ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;opacity:0.5}
.empty-state .title{font-weight:700;font-size:1rem;color:var(--text);margin-bottom:8px}
.empty-state .desc{font-size:0.9rem;max-width:360px;margin:0 auto;line-height:1.6}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#c0c0c0}

/* ── Responsive ── */
@media(max-width:1024px){
  .tab{padding:6px 10px;font-size:0.8rem}
  .header .shell{gap:12px}
}
@media(max-width:768px){
  .header .shell{flex-wrap:wrap;height:auto;padding-top:12px;padding-bottom:8px;gap:8px}
  .vdiv{display:none}
  #nav{width:100%;gap:2px;padding-bottom:4px}
  .tab{padding:6px 10px;font-size:0.8rem}
  .main{padding-top:110px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .domain-grid{grid-template-columns:repeat(3,1fr)}
  .reader-toc{display:none}
  .reader-layout{flex-direction:column}
  .glossary-grid{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr}
  .modal{padding:24px}
}
@media(max-width:480px){
  .domain-grid{grid-template-columns:repeat(2,1fr)}
  .stat-grid{grid-template-columns:1fr}
}

<!-- Auth Screen (shown when not logged in) -->

    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <h2>Create Account</h2>

        <div class="form-group">
          <label class="form-label" for="register-email">Email</label>

        </div>
        <div class="form-group">
          <label class="form-label" for="register-password">Password</label>

        </div>

      </form>
      <div class="auth-toggle">Already have an account? <a id="show-login">Sign in</a></div>
    </div>
  </div>
  <div style="text-align:center;font-size:0.75rem;color:#999;margin-top:16px">&copy; 2026 PlanetCorps AI Academy&trade;</div>
