<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude University — Study Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
a{color:var(--violet);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Variables ── */
:root{
  --bg:#0a0b14;
  --surface:#12131f;
  --surface2:#1a1b2e;
  --border:rgba(255,255,255,0.07);
  --text:#e8eaf6;
  --muted:#7b7fa6;
  --violet:#8b5cf6;
  --indigo:#818cf8;
  --cyan:#22d3ee;
  --rose:#fb7185;
  --amber:#fbbf24;
  --mint:#34d399;
  --ease:cubic-bezier(0.4,0,0.2,1);
}

/* ── Aurora Background ── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.aurora-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;will-change:transform}
.aurora-orb:nth-child(1){width:600px;height:600px;background:var(--violet);top:-10%;left:-5%;animation:drift1 18s var(--ease) infinite alternate}
.aurora-orb:nth-child(2){width:500px;height:500px;background:var(--cyan);top:40%;right:-10%;animation:drift2 22s var(--ease) infinite alternate}
.aurora-orb:nth-child(3){width:450px;height:450px;background:var(--indigo);bottom:-5%;left:30%;animation:drift3 20s var(--ease) infinite alternate}
@keyframes drift1{to{transform:translate(60px,40px) scale(1.1)}}
@keyframes drift2{to{transform:translate(-50px,-60px) scale(0.9)}}
@keyframes drift3{to{transform:translate(40px,-30px) scale(1.05)}}

/* Grain Overlay */
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035}
.grain::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px 128px}

/* ── Shell ── */
.shell{max-width:1100px;margin:0 auto;padding:0 24px;position:relative;z-index:2}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,11,20,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header .shell{display:flex;align-items:center;gap:20px;height:64px}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.brand-icon{font-size:1.6rem;line-height:1}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;color:var(--text)}
.brand-sub{font-size:0.72rem;color:var(--muted);font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.vdiv{width:1px;height:28px;background:var(--border);flex-shrink:0}
#nav{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
#nav::-webkit-scrollbar{display:none}

/* ── Tabs ── */
.tab{padding:8px 14px;font-size:0.85rem;font-weight:500;color:var(--muted);border-radius:8px 8px 0 0;border-bottom:2px solid transparent;transition:color .2s var(--ease),border-color .2s var(--ease);white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--violet);border-bottom-color:var(--violet)}

/* ── Main ── */
.main{padding-top:88px;padding-bottom:60px;min-height:100vh}

/* ── Views ── */
.view{display:none;animation:fadeUp .35s var(--ease)}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Stat Grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.stat-card{background:var(--surface);border-radius:16px;padding:20px;border:1px solid var(--border);transition:transform .2s var(--ease),border-color .2s var(--ease)}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,0.2)}
.stat-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--violet);line-height:1.1}
.stat-label{color:var(--muted);font-size:0.85rem;margin-top:4px}

/* ── Domain Grid & Progress Rings ── */
.domain-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.domain-card{background:var(--surface);border-radius:16px;padding:20px;border:1px solid var(--border);text-align:center;cursor:pointer;transition:transform .2s var(--ease),border-color .2s var(--ease)}
.domain-card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,0.2)}

/* ── Card (general) ── */
.card{background:var(--surface);border-radius:16px;padding:24px;border:1px solid var(--border);transition:transform .2s var(--ease),border-color .2s var(--ease)}
.card:hover{transform:translateY(-2px);border-color:rgba(139,92,246,0.2)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* ── Quiz ── */
.quiz-container{max-width:720px;margin:0 auto}
.quiz-progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:24px}
.quiz-progress-fill{height:100%;background:var(--violet);border-radius:3px;transition:width .4s var(--ease)}
.quiz-scenario{background:var(--surface2);border-radius:12px;padding:20px;font-style:italic;color:var(--muted);line-height:1.7;margin-bottom:20px;border:1px solid var(--border)}
.quiz-question{font-size:1.05rem;font-weight:600;margin-bottom:16px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:12px}
.quiz-option{background:var(--surface);padding:16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;transition:all .2s var(--ease);line-height:1.5;font-size:0.95rem}
.quiz-option:hover{border-color:var(--violet)}
.quiz-option.selected{border-color:var(--violet);background:rgba(139,92,246,0.1)}
.quiz-option.correct{border-color:var(--mint);background:rgba(52,211,153,0.1);cursor:default}
.quiz-option.wrong{border-color:var(--rose);background:rgba(251,113,133,0.1);cursor:default}
.quiz-option.disabled{pointer-events:none;opacity:0.6}
.quiz-explanation{background:var(--surface2);border-radius:12px;padding:16px;border-left:3px solid var(--violet);margin-top:16px;line-height:1.6;font-size:0.92rem;color:var(--muted)}
.quiz-explanation strong{color:var(--text)}
.quiz-btn{background:var(--violet);color:#fff;border-radius:10px;padding:12px 24px;font-weight:600;font-size:0.95rem;transition:opacity .2s var(--ease),transform .1s var(--ease)}
.quiz-btn:hover{opacity:0.9}
.quiz-btn:active{transform:scale(0.97)}
.quiz-btn:disabled{opacity:0.4;cursor:not-allowed}
.quiz-actions{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.quiz-score{text-align:center;padding:40px 0}
.quiz-score-value{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--violet)}

/* ── Curriculum Reader ── */
.reader-layout{display:flex;gap:24px;align-items:flex-start}
.reader-toc{width:240px;flex-shrink:0;background:var(--surface);border-radius:12px;border:1px solid var(--border);position:sticky;top:88px;max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.reader-toc::-webkit-scrollbar{width:4px}
.reader-toc::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
.toc-header{padding:16px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border)}
.toc-item{padding:8px 16px;font-size:0.85rem;cursor:pointer;border-left:2px solid transparent;color:var(--muted);transition:all .15s var(--ease);display:block;width:100%}
.toc-item:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.toc-item.active{border-left-color:var(--violet);color:var(--violet);background:rgba(139,92,246,0.05)}
.reader-content{flex:1;min-width:0}

/* ── Markdown Body ── */
.md-body h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:16px;color:var(--text)}
.md-body h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.25rem;margin:32px 0 12px;padding-bottom:8px;border-bottom:2px solid;border-image:linear-gradient(90deg,var(--violet),var(--indigo)) 1;color:var(--text)}
.md-body h3{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin:24px 0 8px;color:var(--text)}
.md-body h4{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin:20px 0 8px;color:var(--text)}
.md-body p{margin-bottom:12px;color:var(--muted);line-height:1.7}
.md-body ul,.md-body ol{margin:0 0 12px 20px;color:var(--muted)}
.md-body li{margin-bottom:6px;line-height:1.6}
.md-body li::marker{color:var(--muted)}
.md-body strong{color:var(--text);font-weight:600}
.md-body em{font-style:italic}
.md-body a{color:var(--violet)}
.md-body a:hover{text-decoration:underline}
.md-body code{background:var(--surface2);color:var(--cyan);border-radius:4px;padding:2px 6px;font-size:0.88em;font-family:'Fira Code','Consolas',monospace}
.md-body pre{background:var(--surface);border-radius:12px;padding:16px;overflow-x:auto;margin-bottom:16px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--surface2) transparent}
.md-body pre code{background:none;padding:0;border-radius:0;color:var(--text);font-size:0.85rem;line-height:1.6}
.md-body blockquote{border-left:3px solid var(--violet);background:var(--surface2);padding:12px 16px;border-radius:0 8px 8px 0;margin:16px 0;color:var(--muted);font-style:italic}
.md-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.9rem}
.md-body th{text-align:left;padding:10px 14px;background:var(--surface2);color:var(--text);font-weight:600;border-bottom:1px solid var(--border)}
.md-body td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--muted)}
.md-body tr:nth-child(even) td{background:var(--surface2)}
.md-body hr{border:none;height:1px;background:var(--border);margin:24px 0}
.md-body img{max-width:100%;border-radius:8px}

/* ── Section Checkbox ── */
.section-check{width:16px;height:16px;accent-color:var(--violet);cursor:pointer;vertical-align:middle;margin-right:8px}

/* ── Glossary ── */
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:0.95rem;outline:none;transition:border-color .2s var(--ease)}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(139,92,246,0.4)}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .15s var(--ease);white-space:nowrap}
.pill.active{background:rgba(139,92,246,0.15);color:var(--violet);border:1px solid transparent}
.pill:not(.active){background:transparent;border:1px solid var(--border);color:var(--muted)}
.pill:hover{color:var(--text)}
.glossary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.glossary-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);transition:border-color .2s var(--ease)}
.glossary-card:hover{border-color:rgba(139,92,246,0.2)}
.glossary-term{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:8px;color:var(--text)}
.glossary-def{color:var(--muted);font-size:0.88rem;line-height:1.6}
.domain-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600;background:rgba(139,92,246,0.15);color:var(--violet);margin-top:10px}

/* ── Study Plan ── */
.phase-card{background:var(--surface);border-radius:16px;padding:24px;border:1px solid var(--border);margin-bottom:16px;transition:border-color .2s var(--ease)}
.phase-card.current{border-color:rgba(139,92,246,0.3)}
.phase-card:hover{border-color:rgba(139,92,246,0.15)}
.phase-num{font-family:'Syne',sans-serif;color:var(--violet);font-weight:700;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.phase-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.phase-desc{color:var(--muted);font-size:0.9rem;margin-bottom:16px;line-height:1.6}
.checkpoint-list{display:flex;flex-direction:column;gap:2px}
.checkpoint-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.checkpoint-check{width:18px;height:18px;accent-color:var(--violet);cursor:pointer;flex-shrink:0}
.checkpoint-label{font-size:0.9rem;color:var(--muted);line-height:1.4}
.checkpoint-label.checked{color:var(--text);text-decoration:line-through;opacity:0.6}
.milestone{color:var(--muted);font-style:italic;margin-top:12px;font-size:0.85rem;padding-left:4px}

/* ── Exercises ── */
.exercise-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;transition:border-color .2s var(--ease)}
.exercise-card:hover{border-color:rgba(139,92,246,0.15)}
.exercise-header{display:flex;align-items:center;gap:12px;padding:20px 24px;cursor:pointer;user-select:none}
.exercise-header::after{content:'';width:8px;height:8px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:rotate(45deg);margin-left:auto;flex-shrink:0;transition:transform .2s var(--ease)}
.exercise-card.expanded .exercise-header::after{transform:rotate(-135deg)}
.exercise-num{font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;color:var(--violet);text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
.exercise-title{font-weight:600;font-size:0.95rem;color:var(--text)}
.exercise-body{padding:0 24px 24px;display:none}
.exercise-card.expanded .exercise-body{display:block}
.exercise-desc{color:var(--muted);font-size:0.9rem;line-height:1.6;margin-bottom:16px}
.criteria-list{display:flex;flex-direction:column;gap:6px}
.criteria-item{display:flex;align-items:flex-start;gap:10px;font-size:0.88rem;color:var(--muted);line-height:1.5}
.criteria-item input[type="checkbox"]{margin-top:4px;accent-color:var(--violet);cursor:pointer;flex-shrink:0}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s var(--ease)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:16px;max-width:500px;width:calc(100% - 48px);padding:32px;border:1px solid var(--border);animation:scaleIn .25s var(--ease)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.15rem;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:6px;font-weight:500}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;transition:border-color .2s var(--ease)}
.form-input:focus{border-color:rgba(139,92,246,0.4)}
.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;min-height:120px;resize:vertical;transition:border-color .2s var(--ease)}
.form-textarea:focus{border-color:rgba(139,92,246,0.4)}
.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:0.92rem;outline:none;transition:border-color .2s var(--ease);appearance:none}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
.btn-primary{background:var(--violet);color:#fff;border-radius:10px;padding:10px 20px;font-weight:600;font-size:0.9rem;transition:opacity .2s var(--ease)}
.btn-primary:hover{opacity:0.9}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 20px;font-weight:500;font-size:0.9rem;transition:color .15s var(--ease),border-color .15s var(--ease)}
.btn-secondary:hover{color:var(--text);border-color:rgba(255,255,255,0.15)}

/* ── Footer ── */
.footer{text-align:center;padding:32px 0 24px;font-size:0.8rem;color:var(--muted);position:relative;z-index:2}
.footer strong{color:var(--text);font-weight:600}

/* ── Utilities ── */
.hidden{display:none!important}
.flex{display:flex}
.flex-col{display:flex;flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-8{gap:8px}
.gap-12{gap:12px}
.gap-16{gap:16px}
.gap-20{gap:20px}
.gap-24{gap:24px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}
.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}
.mb-24{margin-bottom:24px}
.text-center{text-align:center}
.text-muted{color:var(--muted)}
.text-violet{color:var(--violet)}
.text-sm{font-size:0.85rem}
.font-syne{font-family:'Syne',sans-serif}
.fw-700{font-weight:700}
.fw-800{font-weight:800}
.w-full{width:100%}

/* ── Loading Skeleton ── */
.loading{position:relative;overflow:hidden;background:var(--surface2);border-radius:8px}
.loading::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.loading-block{height:16px;margin-bottom:12px;border-radius:6px}
.loading-block.lg{height:24px;width:60%}
.loading-block.sm{height:12px;width:40%}
.loading-card{height:160px;border-radius:16px}

/* ── Section Title ── */
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text);margin-bottom:16px}

/* ── Quick Action Button ── */
.quick-action{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-weight:500;font-size:0.9rem;color:var(--text);transition:all .2s var(--ease);cursor:pointer}
.quick-action:hover{border-color:rgba(139,92,246,0.3);transform:translateY(-1px)}
.quick-action .icon{font-size:1.2rem}

/* ── Back Button ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:0.88rem;font-weight:500;cursor:pointer;padding:6px 0;margin-bottom:16px;transition:color .15s var(--ease)}
.back-btn:hover{color:var(--text)}
.back-btn::before{content:'\2190';font-size:1rem}

/* ── Empty State ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;opacity:0.5}
.empty-state .title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text);margin-bottom:8px}
.empty-state .desc{font-size:0.9rem;max-width:360px;margin:0 auto;line-height:1.6}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.1)}

/* ── Responsive ── */
@media(max-width:768px){
  .header .shell{flex-wrap:wrap;height:auto;padding-top:12px;padding-bottom:8px;gap:8px}
  .vdiv{display:none}
  #nav{width:100%;gap:2px;padding-bottom:4px}
  .tab{padding:6px 10px;font-size:0.8rem}
  .main{padding-top:110px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .domain-grid{grid-template-columns:repeat(3,1fr)}
  .reader-toc{display:none}
  .reader-layout{flex-direction:column}
  .glossary-grid{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr}
  .modal{padding:24px}
}
@media(max-width:480px){
  .domain-grid{grid-template-columns:repeat(2,1fr)}
  .stat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Aurora Background -->
<div class="aurora">
  <div class="aurora-orb"></div>
  <div class="aurora-orb"></div>
  <div class="aurora-orb"></div>
</div>
<div class="grain"></div>

<!-- Header -->
<header class="header">
  <div class="shell">
    <div class="brand">
      <div class="brand-icon">🎓</div>
      <div>
        <div class="brand-name">Claude University</div>
        <div class="brand-sub">Study Dashboard</div>
      </div>
    </div>
    <div class="vdiv"></div>
    <nav id="nav">
      <button class="tab active" data-view="dashboard">Dashboard</button>
      <button class="tab" data-view="programs">Programs</button>
      <button class="tab" data-view="curriculum">Curriculum</button>
      <button class="tab" data-view="assessments">Assessments</button>
      <button class="tab" data-view="glossary">Glossary</button>
      <button class="tab" data-view="study-plan">Study Plan</button>
      <button class="tab" data-view="exercises">Exercises</button>
    </nav>
  </div>
</header>

<!-- Main Content -->
<div class="main">
  <div class="shell">

    <!-- Dashboard -->
    <div class="view active" id="view-dashboard">
      <div class="loading loading-block lg mb-16"></div>
      <div class="stat-grid mb-24">
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
      </div>
      <div class="loading loading-block lg mb-16"></div>
      <div class="domain-grid mb-24">
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
      </div>
    </div>

    <!-- Programs -->
    <div class="view" id="view-programs">
      <div class="loading loading-block lg mb-16"></div>
      <div class="card-grid">
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
      </div>
    </div>

    <!-- Curriculum -->
    <div class="view" id="view-curriculum">
      <div class="loading loading-block lg mb-16"></div>
      <div class="card-grid">
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
      </div>
    </div>

    <!-- Assessments -->
    <div class="view" id="view-assessments">
      <div class="loading loading-block lg mb-16"></div>
      <div class="card-grid">
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
      </div>
    </div>

    <!-- Glossary -->
    <div class="view" id="view-glossary">
      <div class="loading loading-block lg mb-16"></div>
      <div class="loading loading-block mb-16" style="height:44px"></div>
      <div class="glossary-grid">
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
        <div class="loading loading-card"></div>
      </div>
    </div>

    <!-- Study Plan -->
    <div class="view" id="view-study-plan">
      <div class="loading loading-block lg mb-16"></div>
      <div class="loading loading-card mb-16" style="height:200px"></div>
      <div class="loading loading-card mb-16" style="height:200px"></div>
      <div class="loading loading-card mb-16" style="height:200px"></div>
      <div class="loading loading-card mb-16" style="height:200px"></div>
    </div>

    <!-- Exercises -->
    <div class="view" id="view-exercises">
      <div class="loading loading-block lg mb-16"></div>
      <div class="loading loading-card mb-12" style="height:70px"></div>
      <div class="loading loading-card mb-12" style="height:70px"></div>
      <div class="loading loading-card mb-12" style="height:70px"></div>
      <div class="loading loading-card mb-12" style="height:70px"></div>
    </div>

  </div>
</div>

<!-- Footer -->
<div class="footer">
  <strong>Claude University</strong> &middot; Running on port 3009
</div>

<script src="/app.js"></script>
</body>
</html>
